        //定义类Animals
        class Animals{

            }
            

            
        }

        }

             return this.x * this.y;

        }

        //重写父类构造器 增加一个参数name
        constructor(x,y,name){

            super(x,y);
            this.name = name;
        }

        
        //重写父类的方法
