<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>

    <script>
        /*
        promise是异步编程的一种解决方案
        promise对象有以下两个特点

        
            1、对象的状态不受外界影响。promise对象代表一个异步操作，有三种状态，分别是：“pending"(进行中)、 “resolved”(已成功) 、"rejected"(已经失败)。
            2、一旦状态改变，就不会再变，任何时候都可以得到这个结果。promise对象的状态改变，只有两种可能结果：从pending变为resolved和从pending变为rejected
        
        Promise主要解决了回调函数地狱式嵌套问题。
            */ 

    //创建promise对象
    // let promise = new Promise((resolve,reject)=>{
    //     //resolve('成功凝固结果');
    //     reject('失败');
    // })

    // promise.then(result=>{
    //     console.log(result);
    // },err=>{
    //     console.log(err);
    // })
    // console.log(typeof(promise.then));//显然 then是promise对象中的一个方法，可以得到处理完成后的结果;它有两个参数，成功后执行参数1，失败后执行参数2
   

   ///////////////////////////////////////////
   let p = new Promise((resolve,reject)=>{
       var nums = [1,2,3,4,5,6,7,8];
       var arr = [];
       for(let i = 0;i< nums.length;i++){
           if(nums[i] > 5){
               arr.push(nums[i]);
           }
       }
       resolve(arr);
   })

   p.then(res => {
       console.log(res);
   }).catch(err => {
       console.log(err);
   })

   p.then(data=>{
       console.log(data);
       return data[0]; //6
   }).then(r => {
       console.log(r);
       return r + r; //6+6
   }).then(R => {
       console.log(R);
       return R * R; //12*12
   }).then(f =>{
       console.log(f);
       return '可以一直嵌套下去，比地狱式要美丽些';
       
   }).then(printlog=>{
       console.log(printlog);
   })
       
    </script>

</head>
